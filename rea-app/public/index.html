<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REA Automation — Evidence-Based Management</title>
  <meta name="description" content="Automated Rapid Evidence Assessment workflow tool for Evidence-Based Management research.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="14" stroke="url(#g1)" stroke-width="2.5"/>
          <path d="M10 16h12M10 11h8M10 21h10" stroke="url(#g1)" stroke-width="2" stroke-linecap="round"/>
          <defs><linearGradient id="g1" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
            <stop stop-color="#6378ff"/><stop offset="1" stop-color="#a78bfa"/>
          </linearGradient></defs>
        </svg>
        REA Automation
      </div>
      <div class="sidebar-project" id="sidebar-project-name">No project open</div>
    </div>

    <nav class="stage-steps" id="stage-nav"></nav>

    <div class="sidebar-bottom">
      <button class="btn-sidebar" onclick="App.goHome()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        All Projects
      </button>
      <button class="btn-sidebar" style="margin-top:6px" onclick="App.openSettings()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Settings
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main id="main">
    <header id="topbar">
      <div>
        <div class="topbar-stage" id="topbar-stage">Home</div>
        <div class="topbar-title" id="topbar-title">REA Automation</div>
      </div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </header>
    <div id="content">
      <div class="loading-overlay"><div class="spinner"></div><span>Loading…</span></div>
    </div>
  </main>

</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-title" id="modal-title">Modal</div>
    <div id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<!-- TOASTS -->
<div id="toast-container"></div>

<script src="api.js"></script>
<script src="stages-1-4.js"></script>
<script src="stages-5-10.js"></script>
<script src="app.js"></script>
</body>
</html>
