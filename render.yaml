services:
  - type: web
    name: rea-app
    runtime: node
    rootDir: rea-app
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false        # set manually in Render dashboard
      - key: MONGODB_URI
        sync: false        # set manually in Render dashboard
